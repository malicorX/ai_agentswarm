name: Verify GitHub Pages

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Pages is enabled
        run: |
          python scripts/check_pages_ready.py \
            --expected-url https://malicorx.github.io/ai_agentswarm
      - name: Smoke-check pilot index
        run: |
          curl -fsSL "https://malicorx.github.io/ai_agentswarm/" | grep -q "AgentSwarm Pilot"
          curl -fsSL "https://malicorx.github.io/ai_agentswarm/news-hub/" | head -c 200
