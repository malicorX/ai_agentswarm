name: Verify staging (full)

on:
  workflow_dispatch:
  schedule:
    # Sundays 06:00 UTC — weekly staging health check (P7.11)
    - cron: "0 6 * * 0"

concurrency:
  group: verify-staging-full
  cancel-in-progress: true

jobs:
  full-staging-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e platform -e agents

      - name: Full staging verify (theebie)
        env:
          AGENTSWARM_BOOTSTRAP_TOKEN: ${{ secrets.AGENTSWARM_BOOTSTRAP_TOKEN }}
          AGENTSWARM_ASSIGNMENT_SECRET: ${{ secrets.AGENTSWARM_ASSIGNMENT_SECRET }}
          AGENTSWARM_VERIFY_FULL: "1"
          AGENTSWARM_EXPECT_DISPATCH: "1"
          AGENTSWARM_EXPECT_REGISTRATION_AUTH: "1"
          AGENTSWARM_VERIFY_SKIP_NEWS: "1"
          AGENTSWARM_VERIFY_SKIP_MCP: "1"
          AGENTSWARM_VERIFY_SUBJECTIVE_MIN_REVIEWERS: "1"
        run: python scripts/verify_production_staging.py https://theebie.de/agentswarm/api
