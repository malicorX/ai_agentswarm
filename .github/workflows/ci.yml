name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./platform[dev]" -e "./agents" -e "./packages/sdk-python" pytest
      - name: Platform tests
        run: python -m pytest -q platform/tests
      - name: Agent tests
        run: python -m pytest -q agents/tests
      - name: Pilot site tests
        run: python -m pytest -q pilot/news-hub/tests
  sdk-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build and test TypeScript SDK
        working-directory: packages/sdk-typescript
        run: |
          npm install
          npm test
