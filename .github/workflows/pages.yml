name: Deploy pilot site

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "pilot/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      artifact_ref:
        description: Artifact ref from AgentSwarm deploy request (optional)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe Pages enablement
        id: pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_pages_ready.py --format=action >> "$GITHUB_OUTPUT"
      - name: Build static site
        shell: bash
        env:
          ARTIFACT_REF: ${{ github.event.inputs.artifact_ref }}
        run: |
          set -euo pipefail
          if [ -n "${ARTIFACT_REF:-}" ]; then
            echo "AgentSwarm artifact_ref=${ARTIFACT_REF}"
          fi
          mkdir -p _site/news-hub _site/dashboard
          cp pilot/index.html _site/index.html
          cp -r pilot/news-hub/. _site/news-hub/
          cp -r pilot/dashboard/. _site/dashboard/
      - name: Skip deploy until Pages is enabled
        if: steps.pages.outputs.enabled != 'true'
        run: |
          echo "::notice::GitHub Pages is not enabled. Build succeeded; deploy skipped."
          echo "Enable Pages in repo Settings, then re-run this workflow (see issue #1)."
      - name: Warn on manual dispatch when Pages disabled
        if: github.event_name == 'workflow_dispatch' && steps.pages.outputs.enabled != 'true'
        run: |
          echo "::warning::Pages not enabled. Settings → Pages → GitHub Actions, then re-run."
          echo "Build succeeded; deploy skipped (see issue #1)."
      - uses: actions/configure-pages@v5
        if: steps.pages.outputs.enabled == 'true'
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outputs.enabled == 'true'
        with:
          path: _site
      - id: deployment
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4
