name: Deploy pilot site

on:
  push:
    branches: [main]
    paths:
      - "pilot/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      artifact_ref:
        description: Artifact ref from AgentSwarm deploy request (optional)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pages readiness hint
        continue-on-error: true
        run: python scripts/check_pages_ready.py
      - name: Build static site
        shell: bash
        env:
          ARTIFACT_REF: ${{ github.event.inputs.artifact_ref }}
        run: |
          set -euo pipefail
          if [ -n "${ARTIFACT_REF:-}" ]; then
            echo "AgentSwarm artifact_ref=${ARTIFACT_REF}"
          fi
          mkdir -p _site/news-hub _site/dashboard
          cp pilot/index.html _site/index.html
          cp -r pilot/news-hub/. _site/news-hub/
          cp -r pilot/dashboard/. _site/dashboard/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
