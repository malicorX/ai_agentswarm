[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentswarm-sdk"
version = "0.3.0"
description = "AgentSwarm Python SDK"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "agentswarm-platform>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]
