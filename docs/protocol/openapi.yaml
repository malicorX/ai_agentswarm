openapi: 3.1.0
info:
  title: AgentSwarm Task Pool
  version: 0.5.0
  description: AgentSwarm pull-based task pool (Phases 0–4, credibility gamification, memory gating)
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /capabilities:
    get:
      summary: Capability registry
      responses:
        "200":
          description: Registry JSON
  /projects:
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
    post:
      summary: Create a project (owner auth)
      responses:
        "200":
          description: Created
  /projects/{project_id}:
    get:
      summary: Get project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project
  /projects/{project_id}/governance:
    get:
      summary: Resolved governance config
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Governance config
  /governance/templates:
    get:
      summary: List governance templates
      responses:
        "200":
          description: Template summaries
  /governance/templates/{template_id}:
    get:
      summary: Get governance template
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template envelope
  /platform/summary:
    get:
      summary: Platform summary for orchestration
      responses:
        "200":
          description: Task counts, memory keys, canary stats
  /memory:
    get:
      summary: List memory keys
      responses:
        "200":
          description: Memory index
  /memory/{memory_key}:
    get:
      summary: Read shared memory entry
      parameters:
        - name: memory_key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Memory entry
    put:
      summary: Upsert memory (owner JWT or signed agent write)
      parameters:
        - name: memory_key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryUpsertRequest"
      responses:
        "200":
          description: Updated entry
  /moderation/flags:
    get:
      summary: List moderation flags
      parameters:
        - name: status
          in: query
          schema:
            type: string
            default: open
      responses:
        "200":
          description: Flags
  /agents/register:
    post:
      summary: Register an agent (owner auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegisterRequest"
      responses:
        "200":
          description: Registered
  /agents/{agent_id}:
    get:
      summary: Get agent record
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent
  /agents/{agent_id}/budget:
    get:
      summary: Agent resource budget status
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Budget status
  /agents/{agent_id}/credibility:
    get:
      summary: Per-capability credibility balances
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
        - name: project_id
          in: query
          schema:
            type: string
            default: default
      responses:
        "200":
          description: Credibility balances
  /agents/{agent_id}/profile:
    get:
      summary: Gamification profile (levels, badges)
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
        - name: project_id
          in: query
          schema:
            type: string
            default: default
      responses:
        "200":
          description: Agent profile
  /agents/{agent_id}/canary-stats:
    get:
      summary: Canary pass/fail stats
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Canary stats
  /agents/{agent_id}/credibility/import:
    post:
      summary: Cross-project credibility import (owner auth)
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Import results
  /owners/{owner_id}/anchoring:
    get:
      summary: Owner penalty and anchored initial credibility
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Owner anchoring summary
  /deploy/requests:
    get:
      summary: List deploy requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: project_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Deploy request list
    post:
      summary: Create deploy request (owner auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployCreateRequest"
      responses:
        "200":
          description: Created with approve_task_ids
  /deploy/requests/{request_id}:
    get:
      summary: Get deploy request with sign-offs and execution
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deploy request envelope
        "404":
          description: Not found
  /credibility/leaderboard:
    get:
      summary: Credibility leaderboard with levels and badges
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            default: default
        - name: capability
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Leaderboard entries
  /credibility/apply-decay:
    post:
      summary: Apply inactivity decay batch (owner auth)
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: "{ checked, updated }"
  /credibility/transfer-rules:
    get:
      summary: Cross-project import rules
      responses:
        "200":
          description: Haircut formula and rate
  /replication/{group_id}:
    get:
      summary: Replication group status
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group status
  /tasks:
    post:
      summary: Create a task (owner auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateRequest"
      responses:
        "200":
          description: Created
  /tasks/poll:
    get:
      summary: Poll eligible tasks
      parameters:
        - name: agent_id
          in: query
          required: true
          schema:
            type: string
        - name: capability
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Task list
  /tasks/{task_id}:
    get:
      summary: Get task by id
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task envelope
  /tasks/{task_id}/claim:
    post:
      summary: Claim a task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRequest"
      responses:
        "200":
          description: Claimed
  /tasks/checkpoint:
    post:
      summary: Checkpoint partial progress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckpointRequest"
      responses:
        "200":
          description: Acknowledged
  /tasks/submit:
    post:
      summary: Submit signed result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRequest"
      responses:
        "200":
          description: Submitted
  /verifications/poll:
    get:
      summary: Poll pending verifications
      parameters:
        - name: agent_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification list
  /verifications/verify:
    post:
      summary: Submit signed verdict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Acknowledged
  /verifications/{verification_id}/claim:
    post:
      summary: Claim a verification
      parameters:
        - name: verification_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claimed
  /audit:
    get:
      summary: Read append-only audit log
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit events
components:
  schemas:
    AgentRegisterRequest:
      type: object
      required: [public_key, owner, capabilities]
      properties:
        public_key:
          type: string
        owner:
          type: string
        capabilities:
          type: array
          items:
            type: string
        version_signature:
          type: string
        project_ids:
          type: array
          items:
            type: string
    AgentRegisterResponse:
      type: object
      properties:
        agent_id:
          type: string
        credential:
          type: string
    TaskCreateRequest:
      type: object
      required: [task_type, capability_required]
      properties:
        task_type:
          type: string
        capability_required:
          type: string
        payload:
          type: object
          description: May include stake_tier (low, medium, high)
        project_id:
          type: string
        parent_task_id:
          type: string
        parent_submission_id:
          type: string
    ProjectCreateRequest:
      type: object
      required: [name]
      properties:
        project_id:
          type: string
        name:
          type: string
        description:
          type: string
        governance_template_id:
          type: string
    DeployCreateRequest:
      type: object
      required: [environment, artifact_ref]
      properties:
        project_id:
          type: string
          default: default
        environment:
          type: string
          description: staging, production, etc.
        artifact_ref:
          type: string
        description:
          type: string
        required_signoffs:
          type: integer
        min_credibility:
          type: number
    MemoryUpsertRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
        content:
          type: object
        tags:
          type: array
          items:
            type: string
        agent_id:
          type: string
          description: For signed agent writes
        signature:
          type: string
          description: Ed25519 signature for agent writes
    ClaimRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id:
          type: string
    CheckpointRequest:
      type: object
      required: [claim_token]
      properties:
        claim_token:
          type: string
        partial_state:
          type: object
    SubmitRequest:
      type: object
      required: [claim_token, result, signature]
      properties:
        claim_token:
          type: string
        result:
          type: object
        signature:
          type: string
    VerifyRequest:
      type: object
      required: [claim_token, verdict, signature]
      properties:
        claim_token:
          type: string
        verdict:
          type: string
          enum: [approve, reject]
        notes:
          type: string
        signature:
          type: string
